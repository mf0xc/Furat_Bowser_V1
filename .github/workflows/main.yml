name: Build Capacitor APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # تم إزالة سطر الـ cache هنا لتجنب الخطأ السابق تماماً لعدم وجود ملف الـ lock

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # هذه الخطوة مهمة جداً لأن مجلد android غير مرفوع في مشروعك، سنقوم بإنشائه الآن ديناميكياً
      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Sync Capacitor
        run: |
          npx cap sync android

      # بناء ملف الـ APK
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      # رفع ملف الـ APK الناتج لتحميله من GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Furat-Browser-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
